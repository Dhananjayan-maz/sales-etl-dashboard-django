<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sales Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="container mt-5">

    <h2 class="text-center mb-4">📊 Sales Dashboard</h2>

    <!-- KPI Cards -->
    <div class="row text-center mb-4">
        <div class="col-md-4">
            <div class="card p-3 shadow">
                <h5>Total Revenue</h5>
                <h3>₹{{ total_revenue }}</h3>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-3 shadow">
                <h5>Total Orders</h5>
                <h3>{{ total_orders }}</h3>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-3 shadow">
                <h5>Top Category</h5>
                <h3>{{ top_category }}</h3>
            </div>
        </div>
    </div>

    <!-- Charts -->
    <div class="row">
        <div class="col-md-6">
            <canvas id="lineChart"></canvas>
        </div>

        <div class="col-md-6">
            <canvas id="barChart"></canvas>
        </div>
    </div>

</div>

<script>
    const dates = {{ dates|safe }};
    const totals = {{ totals|safe }};
    const categories = {{ categories|safe }};
    const categoryTotals = {{ category_totals|safe }};  

    // Line Chart
    new Chart(document.getElementById('lineChart'), {
        type: 'line',
        data: {
            labels: dates,
            datasets: [{
                label: 'Monthly Sales',
                data: totals,
                fill: false,
                tension: 0.1
            }]
        }
    });

    // Bar Chart
    new Chart(document.getElementById('barChart'), {
        type: 'bar',
        data: {
            labels: categories,
            datasets: [{
                label: 'Category Sales',
                data: categoryTotals
            }]
        }
    });
</script>

</body>
</html>
